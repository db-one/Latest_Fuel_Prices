type: vertical-stack
cards:
  - type: markdown
    content: >
      <ha-icon icon="mdi:clock-outline" style="--mdc-icon-size:
      16px;"></ha-icon> 更新时间：{{ state_attr('sensor.zui_xin_you_jie_summary',
      'update_time') }}
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.zui_xin_you_jie_92
        name: 92#汽油
        show_state: true
        styles:
          card:
            - height: 60px
            - background: rgba(234, 67, 53, 0.08)
            - border-radius: 8px
            - padding: 5px
          grid:
            - grid-template-areas: "\"i n\" \"i s\""
            - grid-template-columns: 30% 70%
          state:
            - font-size: 1.1rem
            - font-weight: bold
            - color: "#ea4335"
            - justify-self: start
          name:
            - font-size: 0.9rem
            - color: "#ea4335"
            - justify-self: start
          icon:
            - width: 22px
            - color: "#ea4335"
        icon: mdi:gas-station
